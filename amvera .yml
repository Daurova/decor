meta:
  environment: nodejs
  toolchain:
    name: npm
    version: "20"
build:
  skip: false
  additionalCommands:
    - npm install
    - npm run build --workspace=api
    - ls -la apps/api/dist
  artifacts:
    "*": /
run:
  scriptName: apps/api/dist/main.js
  scriptArguments: null
  nodeArguments: null
  command: null
  persistenceMount: /data
  containerPort: "80"
