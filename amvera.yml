meta:
  environment: node
  toolchain:
    name: npm
    version: 20

build:
  additionalCommands:
    - npm install
    - npm run build --workspace=api   # собираем только бэкенд (чтобы избежать ошибок фронта)
    - ls -la apps/api/dist            # посмотрим, что внутри dist
    - find . -name main.js            # найдём все main.js

run:
  scriptName: apps/api/dist/main.js   # убрали /src/