meta:
  environment: node
  toolchain:
    name: npm
    version: 20

build:
  workDir: ./
  additionalCommands:
    - npm install
    - npm run build
    - ls -la apps/api/dist          # покажет, есть ли папка dist и что внутри
    - find . -name main.js          # найдёт все файлы main.js во всём проекте
run:
  workDir: ./            # тоже корень
  scriptName: apps/api/dist/src/main.js   # путь к скомпилированному бэкенду